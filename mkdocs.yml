site_name: MKDocs test
site_url: https://sitename.example
extra:
  social:
    - icon: simple/youtube
      link: https://www.youtube.com/watch?v=dQw4w9WgXcQ
copyright: Copyright &copy; NEVER!! this is CREATIVE COMMONS, MOTHERFUCKERS! NO COPYRIGHT HERE!

nav:
  - Home: index.md
  - Guide:
      - Project Creation: Project-creation.md
      - Scene and Player Creation: Scene-creation.md
      - Creating a Player Script: player-script.md
      - Creating a Camera Script: camera-script.md
      - Troubleshooting: Troubleshooting.md
  - Glossary: glossary.md

theme:
  name: material
  features:
    - navigation.footer
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo: fontawesome/solid/l #https://brandfetch.com/unity.com?view=library&library=default&collection=logos&asset=idwEUhrAlj&utm_source=https%253A%252F%252Fbrandfetch.com%252Funity.com&utm_medium=copyAction&utm_campaign=brandPageReferral
  palette:
    #Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: red
      accent: deep purple

      #(weirdo) Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: red
      accent: deep orange

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
