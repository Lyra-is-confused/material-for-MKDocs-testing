site_name: MKDocs test
site_url: https://lyra-is-confused.github.io/Unity-Guide-MKDocs/
extra:
  social:
    - icon: simple/github
      link: https://github.com/Lyra-is-confused/Unity-Guide-MKDocs
nav:
    - Home: index.md
    - Project Creation: Project-creation.md
    - Scene and Player Creation: Scene-creation.md
    - Creating a Player Script: player-script.md
    - Creating a Camera Script: Mouse_Look.md
    - Troubleshooting: Troubleshooting.md
    - Glossary: glossary.md

theme:
  name: material
  features:
    - navigation.footer
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    logo:  fontawesome/brands/unity
  palette:
    #Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      primary: red
      accent: deep purple

      #(weirdo) Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      primary: red
      accent: deep orange

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
